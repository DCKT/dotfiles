bind -r g display-popup -d '#{pane_current_path}' -w 100% -h 100% -B -E lazygit 

bind -r u run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -y 10% -w 100% -h 100% -B -E "tmux attach-session -t $SESSION"'

bind -r y run-shell '\
  SESSION="opencode-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "opencode"; \
  tmux display-popup -w 100% -h 100% -B -E "tmux attach-session -t $SESSION"'
